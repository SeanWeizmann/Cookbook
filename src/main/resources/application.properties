spring.application.name=cookbook
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cookbook?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.admin.token=${ADMIN_TOKEN:change-me-admin-token}
app.admin.username=${ADMIN_USERNAME:change-me-admin-username}
app.admin.password=${ADMIN_PASSWORD:change-me-admin-password}
